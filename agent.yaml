spec_version: "0.1.0"

name: guidr-agent
version: 1.0.0
description: "A Git-native AI agent for planning, tracking progress, and improving resumes using persistent Git memory"

model:
  provider: openai
  name: gpt-4o-mini

memory:
  type: git
  auto_commit: true

skills:
  - dailyplanner
  - memorytracker
  - resumeoptimizer

entrypoint: main.py

tags:
